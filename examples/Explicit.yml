trainer:
  type:                   "First_Order_Rollout"

  max_iter:               4000
  n_iter:                 2000
  max_greedy_iter:        4000
  
  # If true, compute a single global mean/std from TRAINING data only, and normalize
  # all training/testing trajectories using these values.
  normalize:              true

  device:                 'cpu'

  First_Order_Rollout:
    lr:                     0.001
    gradient_clip:          100.0     # Long ODE rollouts produce legitimate gradients of 100-130; clipping at 25 discards 80% of the signal.

    # p_rollout grows from p_rollout_init by dp_per_update every rollout_update_freq epochs, capped at max_p_rollout.
    p_rollout_init:         0.01
    rollout_update_freq:    10
    dp_per_update:          0.005
    max_p_rollout:          0.5 
    n_rollouts:             4         # Number of rollable start frames to rollout per training parameter per epoch.

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 10
    IC_dp_per_update:       0.01
    max_p_IC_rollout:       1.0  

    warmup_epochs:          40    # number of epochs to warmup the learning rate after greedy sampling; checkpointing is disabled during warmpup.

    loss_weights:
      recon:                1.0
      LD:                   10.0
      rollout:              0.0
      IC_rollout:           0.5
      coef:                 0.0002

    loss_types:
      recon:                "MSE"
      LD:                   "MSE"
      rollout:              "MSE"
      IC_rollout:           "MSE"
  
workflow:
  use_restart:              False
  restart_file:             
  plot_train_rel_errors:    False

sampler:
  type:                     'FOM_Variance'
  FOM_Variance:
    n_samples:              20        # Number of samples used to compute rollout stds.
    
parameter_space:
  parameters:
    - name:                 A
      test_space_type:      list
      list:                 [0.9, 0.92, 0.94, 0.96, 0.98, 1.0, 1.02, 1.04, 1.06, 1.08, 1.1]
    - name:                 w
      test_space_type:      uniform
      min:                  0.23
      max:                  0.27
      sample_size:          11
      log_scale:            false
  test_space:
    type:                   grid

EncoderDecoder:
  type:                     ae
  ae:
    hidden_widths:          [250, 100, 100, 100]
    activations:            ["sin", "sin", "sin", "sin"]
    latent_dimension:       10
  pair:
    hidden_widths:          [250, 100, 100, 100]
    latent_dimension:       10 
    activations:            ["sin", "sin", "sin", "sin"]

latent_dynamics:
  type:                     sindy
  lstsq_reg:                0.1
  spring:
  sindy:

physics:
  type:                     Explicit
  
  Explicit:
    n_t:                    501
    t_max:                  6
    n_positions:            1000
    x_min:                  -2.5
    x_max:                  2.5
    y_min:                  -2.5
    y_max:                  2.5
    uniform_t_grid:         True
  
  ExplicitSecondOrder:
    n_t:                    501
    t_max:                  6
    n_x:                    1000
    x_min:                  -3
    x_max:                  3
    uniform_t_grid:         True

