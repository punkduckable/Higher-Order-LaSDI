lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.001
    n_samples:              20

    # Note that t_rollout is capped at 0.75 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    100
    dp_per_update:          0.002

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 100
    IC_dp_per_update:       0.01

    max_iter:               15000
    n_iter:                 3000
    max_greedy_iter:        15000

    loss_weights:
      recon:                1.0
      chain_rule:           1.0
      LD:                   1.0
      rollout:              0.2
      IC_rollout:           0.2
      coef:                 0.0001
      consistency:          1.0

    learnable_coefs:        true
  
workflow:
  use_restart:              false
  restart_file:          

parameter_space:
  parameters:
    - name:                 A
      test_space_type:      list
      list:                 [0.9, 0.92, 0.94, 0.96, 0.98, 1.0, 1.02, 1.04, 1.06, 1.08, 1.1]
    - name:                 w
      test_space_type:      uniform
      min:                  0.23
      max:                  0.27
      sample_size:          11
      log_scale:            false
  test_space:
    type:                   grid

model:
  type:                     pair
  ae:
    hidden_widths:          [100]
    latent_dimension:       10
  pair:
    hidden_widths:          [250, 100, 100, 100]
    latent_dimension:       10 
    activations:            ["sin", "sin", "sin", "sin"]

latent_dynamics:
  type:                     spring
  coef_norm_order:          fro
  spring:
  sindy:

physics:
  type:                     Explicit
  Explicit:
    n_t:                    501
    t_max:                  6
    n_x:                    1001
    x_min:                  -3.
    x_max:                  3.
    uniform_t_grid:         True


