trainer:
  lr:                     0.001
  gradient_clip:          10.0      # Maximum allowable gradient magnitude; will rescale gradients if exceeded.
  n_samples:              20        # Used for latent trajectory plotting and new parameter sampling

  # If true, compute a single global mean/std from TRAINING data only, and normalize
  # all training/testing trajectories using these values.
  normalize:              true

  # p_rollout grows from p_rollout_init by dp_per_update every rollout_update_freq epochs, capped at max_p_rollout.
  p_rollout_init:         0.01
  rollout_update_freq:    10
  dp_per_update:          0.005
  max_p_rollout:          0.5       # Maximum proportion of the time window used for rollout loss.
  rollout_spline_order:   1
  n_rollout_targets:      5         # Number of random target times sampled per rollable frame per epoch for the rollout loss.

  p_IC_rollout_init:      0.01
  IC_rollout_update_freq: 10
  IC_dp_per_update:       0.01
  max_p_IC_rollout:       1.0       # Maximum proportion of the time window used for IC rollout loss.

  max_iter:               6000
  n_iter:                 2000
  max_greedy_iter:        6000
  sample_criteria:        'FOM_Rollout'

  warmup_epochs:          40    # Number of epochs to warmup the learning rate after greedy sampling; checkpointing is disabled during warmup.

  loss_weights:
    recon:                1.0
    LD:                   100.0
    rollout:              0.5
    IC_rollout:           0.0
    coef:                 0.01

    chain_rule:           1.0
    consistency:          1.0

  loss_types:
    recon:                "MSE"
    LD:                   "MSE"
    rollout:              "MSE"
    IC_rollout:           "MSE"

  learnable_coefs:        true

workflow:
  use_restart:              False
  restart_file:             
  plot_train_rel_errors:    False

parameter_space:
  parameters:
    - name:                 laser powers
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/9x9 dataset/metadata.txt
    - name:                 scan speed
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/9x9 dataset/metadata.txt
  test_space:
    type:                   grid

EncoderDecoder:
  type:                     cnn_3d
  ae:
    hidden_widths:          [1000, 300, 100]
    activations:            ["tanh", "tanh", "tanh"]
    latent_dimension:       10
  
  cnn_3d:
    # Fully-connected (FC) part
    hidden_widths_fc:   [500, 100]
    activations_fc:     ["gelu", "gelu"]
    latent_dimension:   10

    # Convolutional part (3D)
    conv_channels:      [1, 8, 16, 32]            # Includes input channel.
    conv_kernel_sizes:  3
    conv_strides:       2 
    conv_paddings:      1
    conv_activations:   ["relu", "relu", "relu"]


latent_dynamics:
  type:                     switch
  coef_norm_order:          fro
  lstsq_reg:                1.0           # Ridge-regression regularization for SINDy coefficient initialization (prevents blow-up for new greedy-sampled points).
  switch:

physics:
  type:                     Thermal
  
  Thermal:
    hdf5_dir:               /p/lustre1/robertrs/AI4NS/Generate_Data/9x9 dataset/
    use_cnn:                True
    threshold:              1900.0


