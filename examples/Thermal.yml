lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.0005
    n_samples:              20

    # If true, compute a single global mean/std from TRAINING data only, and normalize
    # all training/testing trajectories using these values.
    normalize:              true

    # Note that t_rollout is capped at 0.75 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    10
    dp_per_update:          0.01
    randomized_rollout:     true    # If true, then the duration is randomized for each IC, with p_rollout acting as a maximum. Otherwise, everything is rolled out by p_rollout.
    rollout_spline_order:   1

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 10
    IC_dp_per_update:       0.01

    max_iter:               3000
    n_iter:                 1500
    max_greedy_iter:        3000

    lr_warmup:              40    # How many epochs to warmup the learning rate for after greedy sampling.
    checkpoint_warmup:      40    # How many epochs to checkpoint the model after after greedy sampling.

    loss_weights:
      recon:                1.0
      LD:                   100.0
      rollout:              1.0
      IC_rollout:           1.0
      coef:                 0.1

      chain_rule:           1.0
      consistency:          1.0

    loss_types:
      recon:                "MSE"
      LD:                   "MSE"
      rollout:              "MSE"
      IC_rollout:           "MSE"

    learnable_coefs:        true
  
workflow:
  use_restart:              False
  restart_file:             
  plot_train_rel_errors:    False

parameter_space:
  parameters:
    - name:                 laser powers
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/5x5 dataset/metadata.txt
    - name:                 scan speed
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/5x5 dataset/metadata.txt
  test_space:
    type:                   grid

model:
  type:                     ae
  ae:
    hidden_widths:          [1000, 300, 80]
    activations:            ["elu", "elu", "tanh"]
    latent_dimension:       10

latent_dynamics:
  type:                     sindy
  coef_norm_order:          fro
  sindy:

physics:
  type:                     Thermal
  
  Thermal:
    hdf5_dir:               /p/lustre1/robertrs/AI4NS/Generate_Data/5x5 dataset/


