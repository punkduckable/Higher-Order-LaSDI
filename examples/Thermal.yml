lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.001
    n_samples:              20

    # Note that t_rollout is capped at 0.75 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    100
    dp_per_update:          0.01
    randomized_rollout:     true    # If true, then the duration is randomized for each IC, with p_rollout acting as a maximum. Otherwise, everything is rolled out by p_rollout.
    rollout_spline_order:   1

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 100
    IC_dp_per_update:       0.01

    max_iter:               2100
    n_iter:                 700
    max_greedy_iter:        2100

    loss_weights:
      recon:                1.0
      LD:                   1.0
      rollout:              0.0
      IC_rollout:           0.0
      coef:                 0.001

      chain_rule:           1.0
      consistency:          1.0

    loss_types:
      recon:                "MAE"
      LD:                   "MAE"
      rollout:              "MAE"
      IC_rollout:           "MAE"
      chain_rule:           "MAE"
      consistency:          "MAE"

    learnable_coefs:        true
  
workflow:
  use_restart:              False
  restart_file:             
  plot_train_rel_errors:    False

parameter_space:
  parameters:
    - name:                 laser powers
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/test/metadata.txt
    - name:                 scan speed
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/test/metadata.txt
  test_space:
    type:                   grid

model:
  type:                     ae
  ae:
    hidden_widths:          [1200, 600, 300, 150]
    activations:            ["GELU", "GELU", "GELU", "GELU"]
    latent_dimension:       20

latent_dynamics:
  type:                     sindy
  coef_norm_order:          fro
  sindy:

physics:
  type:                     Thermal
  
  Thermal:
    hdf5_dir:               /p/lustre1/robertrs/AI4NS/Generate_Data/test/


