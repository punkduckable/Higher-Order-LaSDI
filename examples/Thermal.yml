lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.0008
    gradient_clip:          15.0      # Maximum allowable gradient magnitude; will rescale gradients if exceeded.
    n_samples:              20

    # If true, compute a single global mean/std from TRAINING data only, and normalize
    # all training/testing trajectories using these values.
    normalize:              true

    # Note that t_rollout is capped at 0.5 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    10
    dp_per_update:          0.01
    rollout_spline_order:   1

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 10
    IC_dp_per_update:       0.01

    max_iter:               4000
    n_iter:                 2000
    max_greedy_iter:        4000

    warmup_epochs:          40    # Number of epochs to warmup the learning rate after greedy sampling; checkpointing is disabled during warmup.

    loss_weights:
      recon:                1.0
      LD:                   100.0
      rollout:              1.0
      IC_rollout:           1.0
      coef:                 1.0

      chain_rule:           1.0
      consistency:          1.0

    loss_types:
      recon:                "MSE"
      LD:                   "MSE"
      rollout:              "MSE"
      IC_rollout:           "MSE"

    learnable_coefs:        true
  
workflow:
  use_restart:              False
  restart_file:             
  plot_train_rel_errors:    False

parameter_space:
  parameters:
    - name:                 laser powers
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/5x5 dataset/metadata.txt
    - name:                 scan speed
      test_space_type:      file
      file:                 /p/lustre1/robertrs/AI4NS/Generate_Data/5x5 dataset/metadata.txt
  test_space:
    type:                   grid

model:
  type:                     ae
  ae:
    hidden_widths:          [2000, 600, 200]
    activations:            ["tanh", "tanh", "tanh"]
    latent_dimension:       10

latent_dynamics:
  type:                     switch
  coef_norm_order:          fro
  switch:

physics:
  type:                     Thermal
  
  Thermal:
    hdf5_dir:               /p/lustre1/robertrs/AI4NS/Generate_Data/5x5 dataset/


