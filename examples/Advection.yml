lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.001
    n_samples:              20

    # Note that t_rollout is capped at 0.75 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    100
    dp_per_update:          0.002

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 100
    IC_dp_per_update:       0.01

    max_iter:               21000
    n_iter:                 3000
    max_greedy_iter:        21000

    loss_weights:
      recon:                1.0
      LD:                   1.0
      rollout:              1.0
      IC_rollout:           1.0
      coef:                 0.00001

    learnable_coefs:        true

workflow:
  use_restart:              True
  restart_file:             Advection_07_14_2025_15_10.npy

parameter_space:
  parameters:
    - name:                 w
      min:                  2.8
      max:                  3.2
      test_space_type:      uniform
      sample_size:          10
      log_scale:            false
    - name:                 g
      min:                  1.5
      max:                  1.7
      test_space_type:      uniform
      sample_size:          10
      log_scale:            false
  test_space:
    type:                   grid

model:
  type:                     autoencoder
  autoencoder:
    hidden_widths:          [250, 100, 100, 100]
    latent_dimension:       5  
    activations:            ["sin", "GELU", "GELU", "GELU"]

latent_dynamics:
  type:                     sindy
  coef_norm_order:          fro
  sindy:

physics:
  type:                     Advection
  Advection:


