lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.0001
    n_samples:              20

    # Note that t_rollout is capped at 0.75 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    100
    dp_per_update:          0.007

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 100
    IC_dp_per_update:       0.01

    max_iter:               5000
    n_iter:                 1000
    max_greedy_iter:        5000

    loss_weights:
      recon:                1.0
      chain_rule:           1.0
      LD:                   1.0
      rollout:              1.0
      IC_rollout:           1.0
      coef:                 0.0001
      consistency:          1.0

    learnable_coefs:        true

workflow:
  use_restart:              false
  restart_file:            

parameter_space:
  parameters:
    - name:                 m
      min:                  0.24
      max:                  0.26
      test_space_type:      uniform
      sample_size:          10
      log_scale:            false
    - name:                 w
      min:                  1.8
      max:                  2.2
      test_space_type:      uniform
      sample_size:          10
      log_scale:            false
  test_space:
    type:                   grid

model:
  type:                     pair
  pair:
    hidden_widths:          [250, 100, 100, 100]
    latent_dimension:       20 
    activations:            ["sin", "GELU", "GELU", "GELU"]


latent_dynamics:
  type:                     spring
  coef_norm_order:          fro
  spring:

physics:
  type:                     KleinGordon
  KleinGordon:


