trainer:
  lr:                     0.0005
  gradient_clip:          15.0      # Maximum allowable gradient magnitude; will rescale gradients if exceeded.
  n_samples:              20        # Used for latent trajectory plotting and new parameter sampling

  # If true, compute a single global mean/std from TRAINING data only, and normalize
  # all training/testing trajectories using these values.
  normalize:              false

  # p_rollout grows from p_rollout_init by dp_per_update every rollout_update_freq epochs, capped at max_p_rollout.
  p_rollout_init:         0.01
  rollout_update_freq:    20
  dp_per_update:          0.01
  max_p_rollout:          0.75      # Maximum proportion of the time window used for rollout loss.
  rollout_spline_order:   1
  n_rollout_targets:      3         # Number of random target times sampled per rollable frame per epoch for the rollout loss.

  p_IC_rollout_init:      0.01
  IC_rollout_update_freq: 20
  IC_dp_per_update:       0.01
  max_p_IC_rollout:       1.0       # Maximum proportion of the time window used for IC rollout loss.

  max_iter:               36000
  n_iter:                 6000
  max_greedy_iter:        36000 
  sample_criteria:        'FOM_Variance'

  warmup_epochs:          20    # Number of epochs to warmup the learning rate after greedy sampling; checkpointing is disabled during warmup.

  loss_weights:
    recon:                1.0
    chain_rule:           1.0
    LD:                   1.0
    rollout:              1.0
    IC_rollout:           1.0
    coef:                 0.001
    consistency:          1.0

  loss_types:
    recon:                "MAE"
    chain_rule:           "MAE"
    LD:                   "MAE"
    rollout:              "MAE"
    IC_rollout:           "MAE"
    consistency:          "MAE"

  learnable_coefs:        true

workflow:
  use_restart:              False
  restart_file:             
  plot_train_rel_errors:    False

parameter_space:
  parameters:
    - name:                 m
      min:                  0.24
      max:                  0.26
      test_space_type:      uniform
      sample_size:          11
      log_scale:            false
    - name:                 w
      min:                  1.8
      max:                  2.2
      test_space_type:      uniform
      sample_size:          11
      log_scale:            false
  test_space:
    type:                   grid

EncoderDecoder:
  type:                     pair
  pair:
    hidden_widths:          [250, 100, 100, 100]
    latent_dimension:       10 
    activations:            ["sin", "sin", "sin", "sin"]


latent_dynamics:
  type:                     spring
  coef_norm_order:          fro
  lstsq_reg:                1.0           # Ridge-regression regularization for SINDy coefficient initialization (prevents blow-up for new greedy-sampled points).
  spring:

physics:
  type:                     KleinGordon
  KleinGordon:
    n_t:                    501
    t_max:                  5.0
    uniform_t_grid:         false


