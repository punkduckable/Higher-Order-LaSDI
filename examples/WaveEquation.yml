lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.001
    n_samples:              20

    # If true, compute a single global mean/std from TRAINING data only, and normalize
    # all training/testing trajectories using these values.
    normalize:              false

    # Note that t_rollout is capped at 0.75 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    20
    dp_per_update:          0.01
    randomized_rollout:     True    # If true, then the duration is randomized for each IC, with p_rollout acting as a maximum. Otherwise, everything is rolled out by p_rollout.
    rollout_spline_order:   1

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 20
    IC_dp_per_update:       0.01

    max_iter:               45000
    n_iter:                 5000
    max_greedy_iter:        45000

    lr_warmup:              20    # How many epochs to warmup the learning rate for after greedy sampling.
    checkpoint_warmup:      20    # How many epochs to checkpoint the model after after greedy sampling.

    loss_weights:
      recon:                1.0
      chain_rule:           1.0
      LD:                   1.0
      rollout:              1.0
      IC_rollout:           1.0
      coef:                 0.001
      consistency:          1.0

    loss_types:
      recon:                "MAE"
      chain_rule:           "MAE"
      LD:                   "MAE"
      rollout:              "MAE"
      IC_rollout:           "MAE"
      consistency:          "MAE"

    learnable_coefs:        true

workflow:
  use_restart:              True
  restart_file:             WaveEquation_09_30_2025_09_43.npy
  plot_train_rel_errors:    False

parameter_space:
  parameters:
    - name:                 c
      min:                  0.5
      max:                  0.6
      test_space_type:      uniform
      sample_size:          11
      log_scale:            false
    - name:                 k
      min:                  2.0
      max:                  2.2
      test_space_type:      uniform
      sample_size:          11
      log_scale:            false
  test_space:
    type:                   grid

model:
  type:                     pair
  pair:
    hidden_widths:          [250, 100, 100, 100]
    latent_dimension:       10
    activations:            ["sin", "sin", "sin", "sin"]

latent_dynamics:
  type:                     spring
  coef_norm_order:          fro
  spring:

physics:
  type:                     WaveEquation
  WaveEquation:
    n_t:                    501
    t_max:                  5.0
    uniform_t_grid:         false


