lasdi:
  type:                     gplasdi
  gplasdi:
    lr:                     0.001
    n_samples:              20

    # Note that t_rollout is capped at 0.75 to ensure there are some frames to simulate forward.
    p_rollout_init:         0.01
    rollout_update_freq:    100
    dp_per_update:          0.002
    randomized_rollout:     false    # If true, then the duration is randomized for each IC, with p_rollout acting as a maximum. Otherwise, everything is rolled out by p_rollout.

    p_IC_rollout_init:      0.01
    IC_rollout_update_freq: 100
    IC_dp_per_update:       0.01

    max_iter:               17500
    n_iter:                 2500
    max_greedy_iter:        17500

    loss_weights:
      recon:                1.0
      chain_rule:           1.0
      LD:                   1.0
      rollout:              0.2
      IC_rollout:           0.2
      coef:                 0.0001
      consistency:          1.0

    loss_types:
      recon:                "MAE"
      chain_rule:           "MSE"
      LD:                   "MSE"
      rollout:              "MAE"
      IC_rollout:           "MAE"
      consistency:          "MSE"

    learnable_coefs:        true

workflow:
  use_restart:              False
  restart_file:             

parameter_space:
  parameters:
    - name:                 c
      min:                  0.5
      max:                  0.6
      test_space_type:      uniform
      sample_size:          10
      log_scale:            false
    - name:                 k
      min:                  2.0
      max:                  2.2
      test_space_type:      uniform
      sample_size:          10
      log_scale:            false
  test_space:
    type:                   grid

model:
  type:                     pair
  pair:
    hidden_widths:          [250, 100, 100, 100]
    latent_dimension:       10
    activations:            ["sin", "sin", "sin", "sin"]

latent_dynamics:
  type:                     spring
  coef_norm_order:          fro
  spring:

physics:
  type:                     WaveEquation
  WaveEquation:
    n_t:                    501
    t_max:                  5.0
    uniform_t_grid:         false


